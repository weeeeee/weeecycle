[build]
  command = "cd netlify/functions && npm install"
  publish = "/"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/comm/send"
  to = "/.netlify/functions/send-inquiry"
  status = 200
  force = true

[[redirects]]
  from = "/api/reviews"
  to = "/.netlify/functions/submit-review"
  status = 200
  force = true
