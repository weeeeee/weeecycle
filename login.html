<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Login - Weeecycle</title>
    <style>
        :root {
            --primary: #f26522;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(1.1);
        }

        #error {
            color: #ff5555;
            margin-top: 10px;
            display: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h1>Workshop Login</h1>
        <p>Please sign in to access the workshop dashboard.</p>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required autofocus>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
            <div id="error"></div>
            <div style="margin-top: 15px; text-align: right;">
                <a href="#" id="forgotPasswordLink"
                    style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
            </div>
        </form>

        <form id="forgotPasswordForm" style="display: none;">
            <p style="font-size: 0.9rem; text-align: left; margin-bottom: 15px;">Enter your username or email and we'll
                send a reset link.</p>
            <input type="text" id="forgotIdentifier" placeholder="Username or Email" required>
            <button type="submit">Send Reset Link</button>
            <div id="forgotError" style="color: #ff5555; margin-top: 10px; display: none;"></div>
            <div id="forgotSuccess" style="color: #4CAF50; margin-top: 10px; display: none;"></div>
            <div style="margin-top: 15px; text-align: center;">
                <a href="#" id="backToLoginLink" style="color: #888; text-decoration: none; font-size: 0.9rem;">Back to
                    Login</a>
            </div>
        </form>

        <div class="footer">&copy; 2026 Weeecycle</div>
    </div>

    <script>
        // Reverted to localhost for desktop/laptop stability
        const API_URL = 'http://localhost:3000/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error');
            errorDiv.style.display = 'none';
            errorDiv.textContent = '';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Debug Info Removed for cleaner UI

            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                // Check for non-200 status codes
                if (!res.ok) {
                    if (res.status === 404) {
                        throw new Error(`API Endpoint Not Found (404). \nIs your Web Server (Apache/Nginx) configured to proxy /api to port 3000?`);
                    }
                    const text = await res.text();
                    try {
                        const json = JSON.parse(text);
                        throw new Error(json.error || `Server returned ${res.status}: ${res.statusText}`);
                    } catch (e) {
                        // Show the HTML/Text content for debugging
                        const preview = text.substring(0, 100).replace(/</g, '&lt;');
                        throw new Error(`Server error (${res.status}): ${preview}...`);
                    }
                }

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('workshop_user', JSON.stringify(data.user));
                    localStorage.setItem('workshop_token', 'logged_in');
                    window.location.href = 'workshop.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (err) {
                console.error(err);
                if (err.name === 'AbortError') {
                    errorDiv.textContent = 'Connection Timed Out!';
                } else {
                    errorDiv.innerHTML = 'Failed: ' + err.message; // Allow HTML entities for preview
                }
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const loginFormEl = document.getElementById('loginForm');
        document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
            e.preventDefault();
            loginFormEl.style.display = 'none';
            forgotPasswordForm.style.display = 'block';
            document.getElementById('forgotError').style.display = 'none';
            document.getElementById('forgotSuccess').style.display = 'none';
        });

        document.getElementById('backToLoginLink').addEventListener('click', (e) => {
            e.preventDefault();
            forgotPasswordForm.style.display = 'none';
            loginFormEl.style.display = 'block';
        });

        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = forgotPasswordForm.querySelector('button');
            const errorDiv = document.getElementById('forgotError');
            const successDiv = document.getElementById('forgotSuccess');
            const identifier = document.getElementById('forgotIdentifier').value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                const res = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier })
                });

                const data = await res.json();
                if (res.ok && data.success) {
                    successDiv.textContent = data.message;
                    successDiv.style.display = 'block';
                    forgotPasswordForm.reset();
                } else {
                    throw new Error(data.error || 'Failed to send reset link');
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
