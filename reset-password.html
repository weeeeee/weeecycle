<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Weeecycle Workshop</title>
    <style>
        :root {
            --primary: #f26522;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #2a2a2a;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        button:hover {
            filter: brightness(1.1);
        }

        #error,
        #success {
            margin-top: 10px;
            display: none;
        }

        #error {
            color: #ff5555;
        }

        #success {
            color: #4CAF50;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h1>Reset Password</h1>
        <p>Please enter your new password.</p>

        <form id="resetForm">
            <input type="password" id="newPassword" placeholder="New Password" required minlength="6" autofocus>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
            <button type="submit">Reset Password</button>
            <div id="error"></div>
            <div id="success"></div>
            <div style="margin-top: 15px; text-align: center; display: none;" id="loginLinkContainer">
                <a href="login.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">Go to
                    Login</a>
            </div>
        </form>
        <div class="footer">&copy; 2026 Weeecycle</div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('error').textContent = 'Invalid or missing reset token.';
            document.getElementById('error').style.display = 'block';
            document.querySelector('button').disabled = true;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    successDiv.textContent = 'Password reset successfully!';
                    successDiv.style.display = 'block';
                    document.getElementById('resetForm').reset();
                    btn.style.display = 'none';
                    document.getElementById('loginLinkContainer').style.display = 'block';
                } else {
                    throw new Error(data.error || 'Failed to reset password');
                }
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>

</html>
